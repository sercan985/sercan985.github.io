<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-Tools</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="settings-container">
        <button id="settingsButton">Settings</button>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <label for="apiKey">API Key:</label>
            <input type="password" id="apiKey" placeholder="Enter API Key">
            <label for="model">Model:</label>

            <select name="model" id="model">
                <option value="gemma2-9b-it">Gemma 2 (Multilingual)</option>
                <option value="llama3-groq-8b-8192-tool-use-preview">LLaMA3 small (Faster)</option>
                <option value="llama3-70b-8192">LLaMA3 medium (Faster)</option>
                <option value="llama-3.1-8b-instant">LLaMA3.1 small (Faster)</option>
                <option value="llama-3.1-70b-versatile">LLaMA3.1 medium (Faster and smarter)</option>
                <option value="mixtral-8x7b-32768">Mixtral 8x7B (For longer text)</option>
              </select>

            <div class="range-wrap"> 
                <input id="temp" type="range" name="temp" min="0" max="2" value="1" step="0.2">
                <p id="tempLabel">Balanced</p>
              </div>
            <p><a href="https://console.groq.com/keys" target="_blank">Get an API key</a></p>
            <script>function popupPasswordModal(){
                document.getElementById('passwordPrompt').style.display = "block";
                document.getElementById('passwordInput').focus();
            }</script>
            <a id="myLink" href="#" onclick="popupPasswordModal();return false;">Enter password</a>
        </div>
    </div>

    <div id="passwordPrompt" class="modal">
        <div class="modal-content">
            <h2>Enter Password</h2>
            <input type="password" id="passwordInput" placeholder="Enter password">
            <button id="submitPassword">Submit</button>
            <button id="noPassword">I have my own API key</button>
        </div>
    </div>

    <div class="main-container">
        <h1>Text-Tools</h1>
        <div class="container">

            <textarea id="textInput" lang="en" placeholder="Enter your text here..."></textarea>

            <p id="warningLabel" style="color: #aa0000; display: none;">Please enter a password or an api key in the settings</p>
            <div class="mode-toggle">
                <label for="selectionMode">Selection Mode:</label>
                <input type="checkbox" id="selectionMode">
            </div>
            <p id="errorDisplay" style="color: #aa0000; display: none;"></p>
            <p id="loadingTip" style="display: none;">Try switching to another model if this is too slow</p>
            <div class="loading-indicator"></div>
            <div class="tools">

                <button onclick="summarizeText()">Summarize</button>
                <button onclick="expandText()">Expand</button>
                <button onclick="shortenText()">Shorten</button>
                <button onclick="rephraseText()">Rephrase</button>

                <button onclick="changeStyle()">Change Style</button>
                <button onclick="adjustConcept()">Adjust Concept</button>

                <button onclick="checkGrammar()">Fix Grammar</button>
                <button onclick="translateText()">Translate</button>

                <button onclick="verboseText()">Verbose</button>
                <button onclick="humanize()">Humanize</button>
                <button onclick="custom()">Custom Tool</button>

                <button onclick="undo()">Undo</button>
                <button onclick="redo()">Redo</button>


            </div>
            <div id="styleControl" class="controls">
                <label for="style">Style:</label>
                <input type="text" id="style">
            </div>
            <div id="customControl" class="controls">
                <label for="customIns">Custom tool instructions:</label>
                <input type="text" id="customIns">
            </div>
            <div id="conceptControl" class="controls">
                <label for="concept">Concept:</label>
                <input type="text" id="concept">
                <input type="range" id="conceptSlider" min="0" max="100" value="50">
            </div>
            <div id="languageControl" class="controls">
                <label for="language">Language:</label>
                <input type="text" id="language">
            </div>

            <div id="summaryControl" class="controls">
                <label for="summaryPercent">Summary Percent:</label>
                <input type="number" id="summaryPercent" min="0" max="100" value="50">
            </div>
            <div id="expandControl" class="controls">
                <label for="expandWords">Maximum words to expand (leave empty for unlimited)</label>
                <input type="number" id="expandWords" min="0" value="50">
            </div>




            <div class="font-switcher">
                <label for="fontSelect">Font:</label>
                <select id="fontSelect">
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Courier New', monospace">Courier New</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="Verdana, sans-serif">Verdana</option>
                </select>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
